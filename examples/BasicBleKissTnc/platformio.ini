[env:esp32dev]
platform = espressif32@6.12.0
board = esp32dev
framework = arduino
monitor_speed = 115200

lib_extra_dirs =
  ../..

lib_deps =
  h2zero/NimBLE-Arduino

build_flags =
  -DCONFIG_BT_NIMBLE_MAX_CONNECTIONS=1
  -DCONFIG_BT_NIMBLE_MAX_BONDS=1
  -DCONFIG_BT_NIMBLE_MAX_CCCDS=2
  -DCONFIG_BT_NIMBLE_MSYS1_BLOCK_COUNT=8
  -DCONFIG_BT_NIMBLE_ATT_PREFERRED_MTU=185
  -DCONFIG_BT_NIMBLE_ROLE_CENTRAL_DISABLED=1
  -DCONFIG_BT_NIMBLE_ROLE_OBSERVER_DISABLED=1

[env:esp32dev_baseline]
extends = env:esp32dev
build_flags =
  ${env:esp32dev.build_flags}
  -DBLEKISS_EMPTY_BASELINE=1
