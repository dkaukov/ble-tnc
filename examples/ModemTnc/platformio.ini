; PlatformIO project: Real AFSK modem firmware with selectable KISS transport.
; - esp32dev_ble: BLE-KISS transport (NimBLE)
; - esp32dev_serial: USB serial KISS transport
; - esp32dev_dual: BLE + USB serial KISS transport

[platformio]
default_envs = esp32dev_ble

[env]
platform = espressif32@6.12.0
board = esp32dev
framework = arduino
monitor_speed = 115200

; Use this repo as a local library (BleKissTnc)
lib_extra_dirs =
  ../..

; Pull modem stack dependencies from upstream repos (no local clone required)
lib_deps =
  https://github.com/dkaukov/esp32-afsk.git
  https://github.com/pschatzmann/arduino-audio-tools/archive/refs/tags/v1.0.1.zip
  https://github.com/fatpat/arduino-dra818.git#89582e3ef7bf3f31f1af149e32cec16c4b9e4cf2

[env:esp32dev_ble]
lib_deps =
  ${env.lib_deps}
  h2zero/NimBLE-Arduino
build_flags =
  -DTNC_TRANSPORT_BLE=1
  -DTNC_TRANSPORT_SERIAL=0

[env:esp32dev_serial]
lib_deps =
  ${env.lib_deps}
build_flags =
  -DTNC_TRANSPORT_BLE=0
  -DTNC_TRANSPORT_SERIAL=1

[env:esp32dev_dual]
lib_deps =
  ${env.lib_deps}
  h2zero/NimBLE-Arduino
build_flags =
  -DTNC_TRANSPORT_BLE=1
  -DTNC_TRANSPORT_SERIAL=1
